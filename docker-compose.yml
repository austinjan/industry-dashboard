services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: dashboard
      POSTGRES_PASSWORD: dashboard
      POSTGRES_DB: industry_dashboard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://dashboard:dashboard@db:5432/industry_dashboard?sslmode=disable
      JWT_SECRET: change-me-in-production
      PORT: "8080"
    depends_on:
      - db

volumes:
  pgdata:
