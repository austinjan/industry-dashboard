services:
  db:
    image: timescale/timescaledb:latest-pg16
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-dashboard}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dashboard}
      POSTGRES_DB: ${DB_NAME:-industry_dashboard}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dashboard}"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    image: industry-dashboard:latest
    # Or use: build: .
    restart: always
    ports:
      - "${PORT:-8080}:8080"
    environment:
      DATABASE_URL: postgres://${DB_USER:-dashboard}:${DB_PASSWORD:-dashboard}@db:5432/${DB_NAME:-industry_dashboard}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dashboard-dev-secret}
      PORT: "8080"
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
