              pattern: monotonic

  - name: "Packaging Line 2"
    display_order: 2
    machines:
      - name: "PKG-01"
        model: "Bosch PK-200"
        connection:
          host: "192.168.2.101"
          port: 502
          slave_id: 1
        registers:
          - name: temperature
            address: 40001
            type: holding
            data_type: float32
            unit: "°C"
            fake:
              min: 30
