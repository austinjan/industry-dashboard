              pattern: random
          - name: 運行時間
            address: 40008
            type: holding
            data_type: int32
            unit: "hrs"
            fake:
              min: 0
              max: 10000
              pattern: monotonic

      - name: "CNC-03"
        model: "Haas VF-3"
