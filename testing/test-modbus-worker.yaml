site_code: "TEST"
site_name: "Test Site"
timezone: "Asia/Taipei"
poll_interval: 5s

lines:
  - name: "Test Line"
    display_order: 1
    machines:
      - name: "Simulator-01"
        model: "PyModbus Simulator"
        connection:
          host: "127.0.0.1"
          port: 5020
          slave_id: 1
        registers:
          - name: temperature
            address: 40001
            type: holding
            data_type: float32
            unit: "°C"

          - name: speed
            address: 40003
            type: holding
            data_type: uint16
            unit: "rpm"

          - name: power
            address: 40004
            type: holding
            data_type: float32
            unit: "kW"
